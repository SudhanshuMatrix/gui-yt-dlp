name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install System Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build Binary and Debian Package
        run: |
          # Build the standalone binary and the deb installer
          make deb

      - name: Prepare Binary name
        run: |
          # Rename standalone binary to avoid confusion
          mv dist/gui-yt-dlp dist/gui-yt-dlp-linux

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            gui-yt-dlp_1.0.0_amd64.deb
            dist/gui-yt-dlp-linux

  build-windows:
    name: Build Windows Assets
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build Windows Executable
        run: |
          pyinstaller --clean gui-yt-dlp.spec

      - name: Prepare Executable name
        run: |
          # Rename to specify architecture
          mv dist/gui-yt-dlp.exe dist/gui-yt-dlp-windows.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/gui-yt-dlp-windows.exe

  publish-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: ./release-assets

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: ./release-assets

      - name: Get Project Version
        id: get_version
        run: |
          # Extract version from pyproject.toml dynamically
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: yt-dlp Flow v${{ steps.get_version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/gui-yt-dlp_1.0.0_amd64.deb
            release-assets/gui-yt-dlp-linux
            release-assets/gui-yt-dlp-windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
